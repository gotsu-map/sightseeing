<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理画面 | 江津カードトリップ</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">江津カードトリップ</a>
      <nav aria-label="管理ナビゲーション">
        <a href="index.html">ホームへ戻る</a>
      </nav>
    </header>

    <main>
      <section class="section admin-section">
        <div class="section-heading">
          <p class="eyebrow">Admin console</p>
          <h1>管理者画面</h1>
          <p>
            ユーザーが作成したコースとレビューを確認・削除できます。
            Supabase設定がある場合は共通DB、未設定の場合はこのブラウザ内のデータを管理します。
          </p>
        </div>

        <div class="admin-login" id="adminLoginBox">
          <label>
            管理コード
            <input id="adminPass" type="password" placeholder="管理コードを入力">
          </label>
          <button class="button primary" id="adminLoginButton" type="button">管理画面を開く</button>
          <p class="form-message" id="adminMessage" role="status"></p>
        </div>

        <div id="adminPanel" class="admin-panel" hidden>
          <div id="adminStats" class="builder-stats"></div>

          <div class="admin-grid">
            <section class="admin-card">
              <h2>ユーザー作成コース</h2>
              <div id="adminCourseList" class="admin-list"></div>
            </section>

            <section class="admin-card">
              <h2>投稿レビュー</h2>
              <div id="adminReviewList" class="admin-list"></div>
            </section>
          </div>

          <section class="admin-card">
            <h2>データのバックアップ・復元</h2>
            <p class="empty">エクスポートしたJSONは、別ブラウザへの移行や簡易バックアップに使えます。</p>
            <div class="builder-actions">
              <button class="button ghost" id="refreshDataButton" type="button">再読み込み</button>
              <button class="button ghost" id="exportDataButton" type="button">JSONを表示</button>
              <button class="button ghost danger" id="clearAllUserDataButton" type="button">ユーザー投稿を全削除</button>
            </div>
            <label>
              JSONデータ
              <textarea id="adminDataBox" rows="8" placeholder="エクスポート結果、またはインポートしたいJSONを貼り付け"></textarea>
            </label>
            <button class="button primary" id="importDataButton" type="button">JSONから復元</button>
          </section>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
